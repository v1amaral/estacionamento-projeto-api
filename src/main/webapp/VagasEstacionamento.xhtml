<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <meta charset="UTF-8" />
    <title>Estacionamento Vagas</title>
</h:head>

<f:metadata>
    <f:viewAction action="#{vagaEstacionamentoBean.todasVagas}"/>
</f:metadata>

<h:body>
    <h:form id="mainForm">
        
        <div style="padding: 10px;">
            <p:commandButton icon="pi pi-bars" type="button" 
                             onclick="PF('sidebarVar').show()" 
                             styleClass="ui-button-flat" 
                             value="Menu" />
        </div>

        <p:sidebar widgetVar="sidebarVar" baseZIndex="10000">
            <p:panelMenu style="width:300px">
                <p:submenu label="Opções"></p:submenu>
            </p:panelMenu>
        </p:sidebar>

        <p:contextMenu for="tabelaVagas">
            <p:menuitem value="Visualizar" icon="pi pi-search" update="mainForm" />
            <p:menuitem value="Liberar Vaga" icon="pi pi-times" update="tabelaVagas" />
        </p:contextMenu>

        <h:panelGrid columns="1" style="margin: 20px auto; width: 850px;">
            <p:card>
                <f:facet name="title">
                    <i class="pi pi-car" style="margin-right: 6px;"></i>
                    Vagas
                </f:facet>

                <p:dataTable id="tabelaVagas" 
                             value="#{vagaEstacionamentoBean.vagas}" 
                             var="vaga" 
                             rowKey="#{vaga.vagaId}"
                             selection="#{vagaEstacionamentoBean.vagaSelecionada}" 
                             selectionMode="single"
                             stripedRows="true"
                             size="small">

                    <p:column headerText="ID" width="50" style="text-align: center">
                        <h:outputText value="#{vaga.vagaId}" />
                    </p:column>

                    <p:column headerText="Cliente">
                        <h:outputText value="#{vaga.cliente.nomeCompleto}" rendered="#{vaga.ocupada}" />
                        <h:outputText value="Disponível" rendered="#{not vaga.ocupada}" style="color: #999" />
                    </p:column>
                    
                    <p:column headerText="CPF">
                        <h:outputText value="#{vaga.cliente.cpf}" rendered="#{vaga.ocupada}" />
                        <h:outputText value="---" rendered="#{not vaga.ocupada}" style="color: #999" />
                    </p:column>

                    <p:column headerText="Permanência" width="150" style="text-align: center">
                        <h:outputText value="#{vaga.tempoEstacionado()}" />
                    </p:column>

                </p:dataTable>
            </p:card>
        </h:panelGrid>
    </h:form>
</h:body>
</html>
