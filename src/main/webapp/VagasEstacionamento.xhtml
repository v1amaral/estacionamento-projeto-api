<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <meta charset="UTF-8" />
    <title>Estacionamento Vagas</title>
</h:head>

<f:metadata>
    <f:viewAction action="#{vagaEstacionamentoBean.todasVagas}"/>
</f:metadata>

<h:body>
    <h:form id="mainForm">
        <p:sidebar widgetVar="telaCliente" position="right" styleClass="custom-sidebar">
            <h3>Dados cliente</h3>
        </p:sidebar>
    <h:panelGrid columns="1" style="margin: 0 auto; width: 850px;">
                <p:messages id="messages" closable="false">
                    <p:autoUpdate />
                </p:messages>
        <p:card>
            <f:facet name="title">Vagas</f:facet>
            <div style="margin: 20px auto; width: 850px; display: flex; gap: 10px;">
                <p:menuButton value="Ações" buttonStyleClass="ui-button-secondary">
                    <p:menuitem value="Visualizar Cliente" 
                                 action="#{vagaEstacionamentoBean.visualizar()}"
                                 icon="pi pi-search" 
                                 process="@this tabelaVagas"
                                 update="messages"
                                 id="btnVisualizar"
                                 onclick="PF('telaCliente').show()"
                                 styleClass="ui-button-info"/>
                    <p:menuitem value="Cobrança Saída" 
                                 icon="pi pi-dollar" 
                                 process="@this tabelaVagas"
                                 update="messages"
                                 id="btnCobranca"
                                 styleClass="ui-button-success" />
                    <p:menuitem value="Vincular cliente" 
                                 icon="pi pi-plus" 
                                 process="@this tabelaVagas"
                                 update="messages"
                                 id="btnVincular"
                                 styleClass="ui-button-success" />
                </p:menuButton>
            </div>
            <p:dataTable id="tabelaVagas" 
                         value="#{vagaEstacionamentoBean.vagas}" 
                         var="vaga" 
                         rowKey="#{vaga.vagaId}"
                         selection="#{vagaEstacionamentoBean.vagaSelecionada}" 
                         selectionMode="single"
                         stripedRows="true"
                         filteredValue="#{dtFilterView.filteredCustomers3}"
                         globalFilterFunction="#{dtFilterView.globalFilterFunction}"
                         size="small"
                         paginator="true"
                         rows="10"
                         paginatorPosition="bottom">

                <p:column headerText="Status" width="65" style="text-align: center" sortBy="#{vaga.ocupada}" >
                    <p:tag severity="danger" value="Ocupada" rendered="#{vaga.ocupada}" />
                    <p:tag styleClass="mr-2" severity="success" value="Disponível" rendered="#{not vaga.ocupada}" />
                </p:column>
                
                <p:column headerText="ID" width="45" style="text-align: center" sortBy="#{vaga.vagaId}">
                    <h:outputText value="#{vaga.vagaId}" />
                </p:column>

                <p:column headerText="Cliente" sortBy="#{vaga.cliente.nomeCompleto}">
                    <h:outputText value="#{vaga.cliente.nomeCompleto}" rendered="#{vaga.ocupada}" />
                    <h:outputText value="---" rendered="#{not vaga.ocupada}" style="color: #999" />
                </p:column>
                
                <p:column headerText="CPF" sortBy="#{vaga.cliente.cpf}">
                    <h:outputText value="#{vaga.cliente.cpfFormatado}" rendered="#{vaga.ocupada}" />
                    <h:outputText value="---" rendered="#{not vaga.ocupada}" style="color: #999" />
                </p:column>

                <p:column headerText="Permanência" width="150" style="text-align: center" sortBy="#{vaga.inicioEstacionado}">
                    <h:outputText value="#{vaga.tempoEstacionado()}" />
                </p:column>

            </p:dataTable>
        </p:card>
    </h:panelGrid>
</h:form>
</h:body>
</html>
