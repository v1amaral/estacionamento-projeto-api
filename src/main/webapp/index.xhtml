<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <meta charset="UTF-8" />
    <title>LogIn</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Roboto, Arial, sans-serif;
            height: 100vh;
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                              url('https://www.portaltemponovo.com.br/wp-content/uploads/2025/09/estacionamento.png');
            background-size: cover;
            background-position: center;
            backdrop-filter: blur(8px);
            display: flex;
        }

        .container-form {
            width: 350px; 
            height: 100vh;
            background-color: rgba(255, 255, 255, 0.95); 
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 30px;
            box-sizing: border-box;
        }

        .ui-panel {
            border: none !important;
            background: none !important;
        }

        .ui-panel-titlebar {
            background: #2c3e50 !important;
            color: white !important;
            text-align: center;
        }

        .btn-salvar {
            background-color: #2c3e50 !important;
            border: none !important;
            margin-top: 20px;
            height: 45px;
        }

        .footer-text {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #777;
        }

        .ui-inputfield {
            padding: 10px !important;
        }
    </style>
</h:head>

<h:body>
    <div class="container-form">
        <h:form id="formCad">
            <p:messages id="messages" closable="true">
                <p:autoUpdate />
            </p:messages>

            <p:panel header="Acesse o sistema">
                <h:panelGrid columns="1" styleClass="ui-fluid" style="width: 100%">

                    <p:outputLabel value="Usuário" for="usuario" style="margin-top: 15px; font-weight: bold;" indicateRequired="false"/>
                    <p:inputText id="usuario" value="#{funcionarioBean.usuario}" required="true" />
                    
                    <p:outputLabel value="Senha" for="senha" style="margin-top: 15px; font-weight: bold;" indicateRequired="false"/>
                    <p:password id="senha" value="#{funcionarioBean.senha}" 
                                required="true" toggleMask="true" redisplay="true" />

                    <p:commandButton value="Entrar" 
                                     action="#{funcionarioBean.logar}" 
                                     ajax="false"
                                     styleClass="btn-salvar" />
                </h:panelGrid>
            </p:panel>
            
            <div class="footer-text">
                Site by Vitor Amaral
            </div>
        </h:form>
    </div>
</h:body>
</html>
