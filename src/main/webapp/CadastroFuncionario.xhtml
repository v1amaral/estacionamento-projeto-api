<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <meta charset="UTF-8" />
    <title>Sistema de Estacionamento - Cadastro</title>
    <style>
        body {
            background-color: #f8f9fa;
            font-family: "Segoe UI", Roboto, Arial, sans-serif;
            color: #333;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container-form {
            width: 100%;
            max-width: 500px;
        }
        .ui-panel-titlebar {
            background: #2c3e50 !important; /* Azul escuro neutro */
            color: white !important;
        }
        .footer-text {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #999;
        }
        .btn-salvar {
            background-color: #2c3e50 !important;
            border: none !important;
            margin-top: 10px;
        }
        .link-voltar {
            display: block;
            margin-top: 15px;
            text-align: center;
            text-decoration: none;
            color: #555;
            font-size: 14px;
        }
    </style>
</h:head>

<h:body>
    <div class="container-form">
        <h:form id="formCad">
            <p:messages id="messages" closable="true">
                <p:autoUpdate />
            </p:messages>

            <p:panel header="Cadastro de Funcionário">
                <h:panelGrid columns="1" styleClass="ui-fluid" style="width: 100%">
                    
                    <p:outputLabel value="Nome Completo" for="nomeCompleto" />
                    <p:inputText id="nomeCompleto" value="#{funcionarioBean.funcionario.nomeCompleto}" 
                                 required="true" />

                    <p:outputLabel value="CPF" for="cpf" style="margin-top: 8px" />
                    <p:inputMask id="cpf" value="#{funcionarioBean.funcionario.cpf}" 
                                 mask="999.999.999-99" required="true" />

                    <p:outputLabel value="Usuário" for="usuario" style="margin-top: 8px" />
                    <p:inputText id="usuario" value="#{funcionarioBean.funcionario.usuario}" required="true" />

                    <p:outputLabel value="Senha" for="senha" style="margin-top: 8px" />
                    <p:password id="senha" value="#{funcionarioBean.funcionario.senha}" 
                                required="true" toggleMask="true" redisplay="true" />

                    <p:commandButton value="Salvar Dados" 
                                     actionListener="#{funcionarioBean.salvar}" 
                                     update="@form"
                                     styleClass="btn-salvar" />
                    
                    <p:commandLink value="Ir para listagem de funcionários" 
                                   action="#{funcionarioBean.listarFuncionarios}" 
                                   styleClass="link-voltar" 
                                   immediate="true" />
                </h:panelGrid>
            </p:panel>
        </h:form>

        <div class="footer-text">
            Site by Vitor Amaral
        </div>
    </div>
</h:body>
</html>
