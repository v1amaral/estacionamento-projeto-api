<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <meta charset="UTF-8" />
    <title>Estacionamento Projeto</title>
    
    <h:outputStylesheet library="vitor" name="estilo.css" />
    
</h:head>

<h:body>
    <header>
        <h:graphicImage library="vitor" name="logo.png" />
    </header>

    <div id="conteudo">
        <h:form>
            <h:panelGrid columns="2">
                <h:outputLabel value="Nome completo: " for="nomeCompleto" />
                <h:inputText id="nomeCompleto" value="#{gestaoFuncionarioBean.funcionario.nomeCompleto}"/>
                
                <h:outputLabel value="CPF: " for="cpf" />
                <h:inputText id="cpf" value="#{gestaoFuncionarioBean.funcionario.cpf}"/>

                <h:outputLabel value="Usuario: " for="usuario" />
                <h:inputText id="usuario" value="#{gestaoFuncionarioBean.funcionario.usuario}"/>
                
                <h:outputLabel value="Senha: " for="senha" />
                <h:inputText id="senha" value="#{gestaoFuncionarioBean.funcionario.senha}"/>

                <h:outputLabel />
                <h:commandButton value="Salvar" actionListener="#{gestaoFuncionarioBean.salvar}" />
                
                <h:outputLabel />
                <h:commandLink value="Listar funcionários" action="#{gestaoFuncionarioBean.listarFuncionarios()}" />
            </h:panelGrid>
        </h:form>
    </div>

    <footer>
        Site by Vitor Amaral"
    </footer>
</h:body>
</html>
